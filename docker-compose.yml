services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: extractor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: extractor
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8080
      CONCURRENCY: 4
    depends_on:
      db:
        condition: service_healthy